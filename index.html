<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatStream - Premium Music Player</title>
  <!-- favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-midnight-blue">

  <!-- Drag and Drop Overlay -->
  <div id="drag-upload-overlay" class="drag-upload-overlay d-none">
    <div class="drag-upload-content">
      <div class="drag-upload-icon">📥</div>
      <h2 class="font-gilroy-bold mb-2">Drop your audio files here</h2>
      <p class="text-white-50">Support for MP3 and WAV files</p>
    </div>
  </div>

  <div id="beatstream-app">
    <div class="app-body">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo-section">
          <img src="assets/orange_logo.png" alt="BeatStream Logo" />
          <span class="logo-text">BeatStream</span>
        </div>
